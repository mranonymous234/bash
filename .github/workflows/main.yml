name: Build Apple Bash Fork

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify project
        run: |
          ls -la bash.xcodeproj
          ls -la bash-3.2

      - name: Build Bash (Xcode)
        run: |
          xcodebuild \
            -project bash.xcodeproj \
            -scheme bash \
            -configuration Release \
            -sdk macosx \
            build

      - name: Find output
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "bash" || true
