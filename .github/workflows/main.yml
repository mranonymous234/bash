name: Build Bash (No Configure)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install bison

      - name: Set Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify source
        run: |
          ls -la
          find . -name "Makefile" || true
          find . -name "shell.c" || true

      - name: Fix missing headers (safe patch)
        run: |
          # prevent SDK type conflicts
          echo "#undef ssize_t" >> config.h || true
          echo "#undef pid_t" >> config.h || true
          echo "#undef uid_t" >> config.h || true
          echo "#undef gid_t" >> config.h || true
          echo "#undef mode_t" >> config.h || true
          echo "#undef time_t" >> config.h || true
          echo "#undef clock_t" >> config.h || true
          echo "#undef sigset_t" >> config.h || true
          echo "#undef u_int" >> config.h || true

      - name: Generate parser (Bison)
        run: |
          bison -y -d parse.y || true

      - name: Build mksyntax
        run: |
          clang -O2 -c mksyntax.c
          clang -o mksyntax mksyntax.o

      - name: Build shell
        run: |
          clang -O2 -c shell.c -I. -I./include
          clang -o bash shell.o

      - name: Show output
        run: |
          ls -la bash || true
