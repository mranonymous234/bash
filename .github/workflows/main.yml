name: Build Bash

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install bison

      - name: Set Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Clean source
        run: |
          make distclean || true
          rm -f config.h config-bot.h

      - name: Configure Bash (macOS safe baseline)
        run: |
          ./configure \
            --disable-nls \
            --without-bash-malloc \
            bash_cv_getenv_redef=no \
            bash_cv_have_mbstate_t=yes

      - name: Patch config.h (fix type collisions)
        run: |
          echo "" >> config.h
          echo "/* iOS/macOS SDK conflict fix */" >> config.h
          echo "#undef ssize_t" >> config.h
          echo "#undef pid_t" >> config.h
          echo "#undef uid_t" >> config.h
          echo "#undef gid_t" >> config.h
          echo "#undef mode_t" >> config.h
          echo "#undef time_t" >> config.h
          echo "#undef clock_t" >> config.h
          echo "#undef sigset_t" >> config.h
          echo "#undef u_int" >> config.h

      - name: Build
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: Verify output
        run: |
          ls -la bash || true
          file bash || true
