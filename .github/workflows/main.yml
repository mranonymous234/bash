name: Build Bash (iOS/macOS)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Bash (Xcode project)
        run: |
          xcodebuild \
            -project bash.xcodeproj \
            -scheme bash \
            -configuration Release \
            ARCHS=arm64 \
            SDKROOT=macosx \
            GCC_PREPROCESSOR_DEFINITIONS='CONF_HOSTTYPE="arm" CONF_OSTYPE="darwin" CONF_MACHTYPE="arm-apple-darwin" CONF_VENDOR="apple"' \
            build
