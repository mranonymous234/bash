name: Build Bash for iOS

on:
  push:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Locate Bash source directory
        run: |
          echo "Searching for Bash source..."
          ls -R .

      - name: Configure build
        run: |
          export SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          export CC=$(xcrun --sdk iphoneos -f clang)

          export CFLAGS="-arch arm64 -isysroot $SDK -O2 -DSHELL -DMACOSX"

          ./configure \
            --host=arm-apple-darwin \
            --disable-nls \
            --without-bash-malloc \
            --enable-static-link \
            --disable-debugger

      - name: Build
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-ios-arm64
          path: bash
